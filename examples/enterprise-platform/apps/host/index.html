<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enterprise Platform — esmap MFE Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f8fafc;
        color: #1e293b;
      }

      /* ─── Layout ─── */
      .layout {
        display: grid;
        grid-template-rows: auto 1fr;
        grid-template-columns: 1fr;
        min-height: 100vh;
      }
      #app-auth {
        position: fixed;
        inset: 0;
        z-index: 100;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #app-auth:empty {
        display: none;
      }
      #app-nav {
        background: #1e293b;
        color: #fff;
        padding: 0 24px;
        height: 56px;
        display: flex;
        align-items: center;
      }
      #app-main {
        padding: 24px;
        max-width: 1200px;
        width: 100%;
        margin: 0 auto;
        min-height: 400px;
      }
      #app-main:empty {
        display: none;
      }
      /* keepAlive 컨테이너: 비어 있으면 공간 차지 안 함 */
      #app-dashboard:empty,
      #app-team:empty {
        display: none;
      }

      /* ─── Workspace Layout ─── */
      .workspace-layout {
        display: grid;
        grid-template-columns: 260px 1fr 300px;
        grid-template-rows: auto 1fr;
        height: calc(100vh - 56px);
      }
      #workspace-header {
        grid-column: 1 / -1;
        border-bottom: 1px solid #334155;
        background: #1e293b;
        color: #fff;
        padding: 12px 24px;
      }
      #workspace-sidebar {
        border-right: 1px solid #334155;
        background: #0f172a;
        color: #e2e8f0;
        overflow-y: auto;
      }
      #workspace-main {
        padding: 24px;
        overflow-y: auto;
      }
      #workspace-activity {
        border-left: 1px solid #334155;
        background: #0f172a;
        color: #e2e8f0;
        overflow-y: auto;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <!-- Auth MFE: 로그인 전 오버레이 (ReadyGate) -->
      <div id="app-auth"></div>

      <!-- Navigation bar: 항상 표시 -->
      <div id="app-nav"></div>

      <!-- Main content: 라우트별 MFE (keepAlive 앱은 freeze 시 컨테이너를 숨기므로 별도 컨테이너 필요) -->
      <div
        id="app-dashboard"
        style="padding: 24px; max-width: 1200px; width: 100%; margin: 0 auto; min-height: 400px"
      ></div>
      <div
        id="app-team"
        style="padding: 24px; max-width: 1200px; width: 100%; margin: 0 auto; min-height: 400px"
      ></div>
      <div id="app-main"></div>

      <!-- Workspace: multi-app composition layout -->
      <div id="app-workspace" class="workspace-layout" style="display: none">
        <div id="workspace-header"></div>
        <div id="workspace-sidebar"></div>
        <div id="workspace-main"></div>
        <div id="workspace-activity"></div>
      </div>
    </div>

    <!-- DevTools panel -->
    <div id="esmap-devtools"></div>

    <script src="./src/boot.ts" type="module"></script>
  </body>
</html>
