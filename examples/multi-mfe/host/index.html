<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Esmap MFE Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      #esmap-status {
        position: fixed;
        bottom: 16px;
        right: 16px;
        background: #1a1a2e;
        color: #0f0;
        padding: 12px 16px;
        border-radius: 8px;
        font-family: monospace;
        font-size: 12px;
        max-width: 360px;
        z-index: 1000;
        opacity: 0.9;
      }
      #esmap-status h4 {
        margin-bottom: 8px;
        color: #0ff;
      }
    </style>
  </head>
  <body>
    <div id="app-nav"></div>
    <div id="app-main"></div>
    <div id="app-broken"></div>
    <div id="esmap-status">
      <h4>Esmap Status</h4>
      <div id="status-log">loading...</div>
    </div>

    <!--
      핵심: import map의 URL을 직접 해석하여 dynamic import하므로
      네이티브 import map 타이밍 제약 없이 동작한다.
      import map은 DOM에도 주입하여 브라우저 호환성을 유지한다.
    -->
    <script src="./src/boot.ts" type="module"></script>
  </body>
</html>
